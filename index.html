<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrendRadar — 한국 트렌드 예측 플랫폼</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root {
      height: 100%;
      font-family: 'Noto Sans KR', sans-serif;
      -webkit-font-smoothing: antialiased;
      transition: background 0.3s ease, color 0.3s ease;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #EDEAE3; }
    ::-webkit-scrollbar-thumb { background: #CCC7BC; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #A09CB0; }
    .dark-mode ::-webkit-scrollbar-track { background: #161B27; }
    .dark-mode ::-webkit-scrollbar-thumb { background: #3D4668; }
    .dark-mode ::-webkit-scrollbar-thumb:hover { background: #5E6A8A; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
